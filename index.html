<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Full Screen Flipbook</title>
    
    <script  src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>         
    
    <style>
        body { 
            background: #000; margin: 0; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; 
        }
        
        /* Container that holds the book and the floating button */
        #book-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #flipbook { display: none; }
        
        .page { background-color: #fff; }
        
        img { 
            width: 100%; height: 100%; 
            object-fit: fill; 
            display: block; 
        }

                        /* Mute Button positioned relative to the left to prevent overflow  */
        #mute-btn {
            position: absolute;
            top: 5px;
            left:  75%; /* Pulls it safely away from the right edge */
            transform: translateX(-50%);  /* Centers the button on that 75% mark */
            z-index: 9999; 
            background:  rgba(92, 12, 60, 0.7); /* Darker for better contrast */
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            padding: 10px 18px;
            cursor:  pointer;
            border-radius: 25px;
            font-family: sans-serif;
             font-size: 14px;
            backdrop-filter: blur(8px);
            white-space: nowrap; /*  Keeps text on one line */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

                /* Enlarged Navigation Arrows */
        .nav-arrow {
            position: fixed; 
            top: 50%; 
            transform: translateY(-50%);
            /* Increased from 45px to 60px */
            width: 60px; 
            height: 60px; 
            cursor: pointer; 
            z-index: 1000;
            background: rgba(222, 195, 123, 0.15); 
            border-radius: 50%;
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: 0.3s; 
            border: 1px solid rgba(222, 195, 123, 0.2);
            backdrop-filter: blur(5px);
        }
        
        .nav-arrow:hover { 
            background: rgba(222, 195, 123, 0.4); 
            transform: translateY(-50%) scale(1.1); /* Slight pop on hover */
        }

        .nav-arrow.left { left: 15px; }
        .nav-arrow.right { right: 15px; }
	.right .arrow-icon { transform: rotate(-45deg); }
        .left .arrow-icon { transform: rotate(135deg); }

        /* Enlarged CSS Arrow Shape */
        .arrow-icon {
            border: solid gold; 
            /* Increased thickness from 3px to 5px */
            border-width: 0 5px 5px 0; 
            display: inline-block; 
            /* Increased size from 6px to 12px */
            padding: 8px; 
        }
    </style>
</head>
<body>
<!-- Fully transparent overlay that captures the first touch -->
<div id="fs-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:10001; background:transparent; cursor:pointer;"></div>

    <div id="book-container">
        <!-- Mute Button is now inside the container to float over images -->
        <button id="mute-btn">🔊 Unmuted</button>

        <div id="flipbook">
            <div><img src="1.webp"></div>
            <div><img src="2.webp"></div>
            <div><img src="3.webp"></div>
            <div><a href="https://maps.app.goo.gl/sgbpZvURqTxx6sy99" target="_blank"><img src="4.webp"></a></div>
	    <div><img src="5.webp"></div>
        </div>
    </div>

    <!-- Navigation Arrows -->
    <div class="nav-arrow left" onclick="flipPrev()"><i class="arrow-icon"></i></div>
    <div class="nav-arrow right" onclick="flipNext()"><i class="arrow-icon"></i></div>

    <script type="text/javascript">
        var isMuted = false;
       var flipSound = new Audio('1.mp3');
        var bgMusic =  new Audio('2.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 1;

        $(document).ready(function() {
            renderBook();
        });

                function renderBook() {
            var screenH = $(window).height() * 0.98; 
            var screenW = (screenH / 900) * 506;   

            // This ensures the container is the exact size of the image
            $('#book-container').css({ 
                width: screenW, 
                height: screenH,
                position: 'relative' 
            });

            $("#flipbook").show().turn({
                width: screenW, 
                height: screenH,
                autoCenter: true, 
                display: 'single',
                acceleration: true, 
                duration: 1500, 
                gradients: true, 
                elevation: 300
            });
        }


        // Mute Toggle
        $('#mute-btn').on('click', function(e) {
            e.stopPropagation(); // Prevents click from flipping the page
            isMuted = !isMuted;
            bgMusic.muted = isMuted;
            flipSound.muted = isMuted;
            $(this).text(isMuted ? "🔇 Muted" : "🔊 Unmuted");
        });

        function flipNext() {
            if ($("#flipbook").turn("animating")) return;
            if (bgMusic.paused && !isMuted) bgMusic.play();
            if(!isMuted) { flipSound.currentTime = 0; flipSound.play(); }
            $('#flipbook').turn('next');
        }

        function flipPrev() {
            if ($("#flipbook").turn("animating")) return;
            if (bgMusic.paused && !isMuted) bgMusic.play();
            if(!isMuted) { flipSound.currentTime = 0; flipSound.play(); }
            $('#flipbook').turn('previous');
        }

        $("#flipbook").on("mousedown touchstart", function(e) {
            var offset = $(this).offset();
            var pageX = (e.type === "touchstart") ? e.originalEvent.touches.pageX : e.pageX;
            var relativeX = pageX - offset.left;
            var bookWidth = $(this).width();

            if (relativeX < bookWidth * 0.3) flipPrev();
            else if (relativeX > bookWidth * 0.7) flipNext();
        });

        $(window).bind('keydown', function(e){
            if (e.keyCode == 37) flipPrev();
            else if (e.keyCode == 39) flipNext();
        });

        // Handle browser resize
        $(window).resize(function() {
            location.reload(); // Simplest way to recalculate full-screen on resize
        });
// Function to request fullscreen
const overlay = document.getElementById('fs-overlay');

function activateFullscreen() {
    let elem = document.documentElement;

    // Fullscreen logic for all browsers
    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) { 
        elem.webkitRequestFullscreen(); // Safari/Chrome
    } else if (elem.msRequestFullscreen) { 
        elem.msRequestFullscreen(); // Edge
    }

    // IMPORTANT: Hide the overlay so it doesn't block the flipbook buttons
    overlay.style.display = 'none';

    // Optional: Start your background music on first touch
    if (bgMusic && bgMusic.paused && !isMuted) {
        bgMusic.play();
    }
}

// Listen for both click (Desktop) and touchend (Mobile)
overlay.addEventListener('click', activateFullscreen);
overlay.addEventListener('touchend', activateFullscreen);

	</script>
	</body>
</html>
